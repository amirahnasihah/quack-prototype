; ESP32-2432S028R "Cheap Yellow Display" (CYD) — ESP32-WROOM-32
; Pin reference: https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display
[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; CYD must appear in `pio device list` first (e.g. /dev/cu.wchusbserial110).
; Without this, PlatformIO may pick your Bluetooth headphones by mistake.
; upload_port = /dev/cu.wchusbserial110
; monitor_port = /dev/cu.wchusbserial110

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.4.2

build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
